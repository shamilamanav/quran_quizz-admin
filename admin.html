<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quran Quizz - Admin Dashboard</title>
    
    <!-- PROTECTION SCRIPT: MUST RUN FIRST -->
    <script>
        (function() {
            const role = localStorage.getItem("user_role");
            if (role !== "admin") {
                // If not admin, immediately redirect to login
                window.location.href = "index.html";
            }
        })();
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* --- MINIMAL WHITE THEME --- */
        :root {
            --theme-primary: #6c5ce7; /* Soft Purple/Blue */
            --theme-primary-hover: #5b4cc4;
            --theme-bg: #ffffff;
            --theme-card-bg: #ffffff;
            --theme-text-main: #2d3436;
            --theme-text-sub: #636e72;
            --theme-border: #dfe6e9;
            --theme-accent-pink: #d63031;
            --theme-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            --theme-shadow-hover: 0 15px 35px rgba(108, 92, 231, 0.15);
        }

        /* RESET & BASIC SETUP */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background-color: var(--theme-bg);
            /* Preserved Grid Pattern */
            background-image: linear-gradient(rgba(140, 62, 255, 0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(140, 62, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            padding: 20px;
            color: var(--theme-text-main);
        }

        /* MAIN CONTAINER */
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* NAVBAR */
        .navbar {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 16px;
            box-shadow: var(--theme-shadow);
            border: 1px solid var(--theme-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease-out;
        }

        .navbar h1 {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--theme-primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* LOGOUT BUTTON */
        .logout-btn {
            text-decoration: none;
            color: white;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 10px 24px;
            background: var(--theme-accent-pink);
            border-radius: 50px;
            border: none;
            box-shadow: 0 4px 15px rgba(214, 48, 49, 0.2);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            letter-spacing: 0.5px;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(214, 48, 49, 0.3);
            background: #c0392b;
        }

        /* DASHBOARD GRID */
        .dashboard-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            animation: fadeIn 0.8s ease-out;
        }

        /* CARDS */
        .card {
            background: var(--theme-card-bg);
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 250px;
            text-decoration: none;
            border: 1px solid var(--theme-border);
            box-shadow: var(--theme-shadow);
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--theme-primary);
            box-shadow: var(--theme-shadow-hover);
        }

        /* ICONS */
        .card-icon {
            width: 70px;
            height: 70px;
            margin-bottom: 20px;
            fill: var(--theme-primary);
            background: #f0f0ff; /* Very light purple bg */
            padding: 16px;
            border-radius: 50%;
            transition: all 0.4s;
        }

        .card:hover .card-icon {
            background: var(--theme-primary);
            fill: #ffffff; 
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 10px 20px rgba(108, 92, 231, 0.3);
        }

        .card h3 {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--theme-text-main);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .card p {
            font-size: 0.9rem;
            color: var(--theme-text-sub);
        }

        /* ANIMATIONS */
        @keyframes slideDown {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @media (max-width: 600px) {
            .dashboard-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <script>
        function confirmLogout() {
            if(confirm("Are you sure you want to log out?")) {
                // Clear the session data so they can't access this page again via back button/url
                localStorage.removeItem("user_role");
                localStorage.removeItem("exam_user_id");
                localStorage.removeItem("exam_username");
                
                window.location.href = "index.html"; 
            }
        }
    </script>
</head>
<body>

    <div class="container">
        
        <div class="navbar">
            <h1>Admin Panel</h1>
            <button class="logout-btn" onclick="confirmLogout()">Logout</button>
        </div>

        <div class="dashboard-container">

            <div class="card" onclick="window.location.href='add-question.html'">
                <svg class="card-icon" viewBox="0 0 24 24">
                    <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
                </svg>
                <h3>Add Questions</h3>
                <p>Create and manage exam questions</p>
            </div>

            <div class="card" onclick="window.location.href='view-answer.html'">
                <svg class="card-icon" viewBox="0 0 24 24">
                    <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                </svg>
                <h3>View Submitted</h3>
                <p>Check results and student submissions</p>
            </div>
            
            <div class="card" onclick="window.location.href='archived-submissions.html'">
                <svg class="card-icon" viewBox="0 0 24 24">
                    <path d="M20.54 5.23l-1.39-1.68C18.88 3.21 18.47 3 18 3H6c-.47 0-.88.21-1.16.55L3.46 5.23C3.17 5.57 3 6.02 3 6.5V19c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6.5c0-.48-.17-.93-.46-1.27zM6.24 5h11.52l.83 1H5.42l.82-1zM5 19V8h14v11H5zm11-5.5l-4 4-4-4 1.41-1.41L11 13.67V10h2v3.67l1.59-1.59L16 13.5z"/>
                </svg>
                <h3>Archived</h3>
                <p>View deleted submissions</p>
            </div>

        </div>
    </div>

</body>
</html>
